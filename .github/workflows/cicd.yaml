name: CI / CD for Zilean

on: workflow_dispatch

env:
  IMAGE_NAME: bbc18/zilean

jobs:
  execution:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    name: Build Zilean Image
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.2

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3
        id: qemu
        with:
          platforms: amd64

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.2.0

      - name: Build Docker Metadata
        id: docker-metadata
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          flavor: |
            latest=auto
          tags: |
            type=ref,event=tag
            type=sha,commit=${{ github.sha }}
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Push Service Image to repo
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          provenance: mode=max
          tags: ${{ steps.docker-metadata.outputs.tags }}
          labels: ${{ steps.docker-metadata.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha,scope=${{ github.workflow }}
          cache-to: type=gha,mode=max,scope=${{ github.workflow }}

      - name: Delete non-latest images from Docker Hub
        run: |
          PAYLOAD=$(jq -n --arg username "${{ vars.DOCKERHUB_USERNAME }}" --arg password "${{ secrets.DOCKERHUB_TOKEN }}" '{username: $username, password: $password}')
          TOKEN=$(curl -s -H "Content-Type: application/json" -X POST -d "$PAYLOAD" https://hub.docker.com/v2/users/login/ | jq -r .token)
          TAGS=$(curl -s -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/?page_size=100" | jq -r '.results[]?.name')
          for TAG in $TAGS; do
            if [ "$TAG" != "latest" ] && [ -n "$TAG" ]; then
              echo "Deleting tag: $TAG"
              curl -s -X DELETE -H "Authorization: JWT ${TOKEN}" "https://hub.docker.com/v2/repositories/${{ env.IMAGE_NAME }}/tags/$TAG/"
            fi
          done

